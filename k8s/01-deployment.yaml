apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmix-app
  namespace: kl3init-dev
  labels:
    app: jmix-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: jmix-app

  template:
    metadata:
      labels:
        app: jmix-app

    spec:
      serviceAccountName: hazelcast-sa

      containers:
        - name: jmix-app
          image: docker.io/kl3init/jmix-k8s:1.0.7
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
            - containerPort: 5701

          envFrom:
            - configMapRef:
                name: jmix-config
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]