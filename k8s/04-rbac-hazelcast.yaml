apiVersion: v1
kind: ServiceAccount
metadata:
  name: hazelcast-sa
  namespace: kl3init-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hazelcast-role
  namespace: kl3init-dev
rules:
  - apiGroups: [""]
    resources:
      - pods
      - endpoints
      - services
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hazelcast-rolebinding
  namespace: kl3init-dev
subjects:
  - kind: ServiceAccount
    name: hazelcast-sa
    namespace: kl3init-dev
roleRef:
  kind: Role
  name: hazelcast-role
  apiGroup: rbac.authorization.k8s.io